openapi: 3.0.3
info: {title: QR Service, version: 1.0.0}
paths:
  /api/v1/qr:
    post:
      summary: Generate QR code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [data]
              properties:
                data: {type: string, minLength: 1, maxLength: 2953}
                error_correction: {type: string, enum: [L, M, Q, H], default: M}
                border: {type: integer, minimum: 0, maximum: 40, default: 4}
      responses:
        "201":
          description: QR created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [qr_id, error_correction, qr_size, image_url, border]
                properties:
                  qr_id: {type: string}
                  error_correction: {type: string, enum: [L, M, Q, H]}
                  qr_size: {type: integer}
                  image_url: {type: string}
                  border: {type: integer}
        "422":
          description: Payload does not fit selected version/EC level
